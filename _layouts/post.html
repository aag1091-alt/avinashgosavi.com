---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span class="post-author">{{ site.author.username }}</span>
      <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%b %d, %Y" }}</time>
      {% if page.read_time %} <span class="post-read-time">{{ page.read_time }} min read</span>{% endif %}
    </div>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
