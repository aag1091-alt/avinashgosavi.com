<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="Georgia, serif">
  <rect width="820" height="320" fill="#0f1117"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">Attractor — Phase 1 Architecture</text>

  <!-- Client -->
  <rect x="30" y="120" width="120" height="80" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="90" y="155" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">Client</text>
  <text x="90" y="172" text-anchor="middle" fill="#6b7280" font-size="11">memlog / agent</text>
  <text x="90" y="187" text-anchor="middle" fill="#6b7280" font-size="11">/ any HTTP</text>

  <!-- Arrow: Client → FastAPI -->
  <line x1="152" y1="160" x2="198" y2="160" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="175" y="150" text-anchor="middle" fill="#6b7280" font-size="10">REST</text>

  <!-- FastAPI -->
  <rect x="200" y="100" width="140" height="120" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="270" y="130" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">FastAPI</text>
  <text x="270" y="150" text-anchor="middle" fill="#6b7280" font-size="11">POST /memories</text>
  <text x="270" y="166" text-anchor="middle" fill="#6b7280" font-size="11">POST /memories/search</text>
  <text x="270" y="182" text-anchor="middle" fill="#6b7280" font-size="11">GET  /memories/:id</text>
  <text x="270" y="198" text-anchor="middle" fill="#6b7280" font-size="11">DELETE /memories/:id</text>

  <!-- Arrow: FastAPI → Encoder -->
  <line x1="340" y1="130" x2="390" y2="130" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Encoder -->
  <rect x="392" y="80" width="150" height="100" rx="8" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="467" y="110" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">Encoder</text>
  <text x="467" y="130" text-anchor="middle" fill="#6b7280" font-size="11">sentence-transformers</text>
  <text x="467" y="147" text-anchor="middle" fill="#818cf8" font-size="11">all-MiniLM-L6-v2</text>
  <text x="467" y="163" text-anchor="middle" fill="#6b7280" font-size="11">→ 384-dim vector</text>

  <!-- Arrow: FastAPI → PgStore -->
  <line x1="340" y1="185" x2="390" y2="220" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- PgStore -->
  <rect x="392" y="190" width="150" height="80" rx="8" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="467" y="218" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">PgStore</text>
  <text x="467" y="237" text-anchor="middle" fill="#6b7280" font-size="11">asyncpg connection pool</text>
  <text x="467" y="253" text-anchor="middle" fill="#6b7280" font-size="11">write / get / search / delete</text>

  <!-- Arrow: Encoder → Postgres -->
  <line x1="545" y1="130" x2="610" y2="130" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Arrow: PgStore → Postgres -->
  <line x1="545" y1="230" x2="610" y2="220" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Postgres -->
  <rect x="612" y="80" width="170" height="190" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="697" y="110" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">PostgreSQL</text>
  <text x="697" y="130" text-anchor="middle" fill="#34d399" font-size="11">+ pgvector</text>
  <line x1="632" y1="140" x2="762" y2="140" stroke="#374151" stroke-width="1"/>
  <text x="697" y="158" text-anchor="middle" fill="#6b7280" font-size="11">content  TEXT</text>
  <text x="697" y="174" text-anchor="middle" fill="#6b7280" font-size="11">context  JSONB</text>
  <text x="697" y="190" text-anchor="middle" fill="#6b7280" font-size="11">tags     JSONB</text>
  <text x="697" y="206" text-anchor="middle" fill="#818cf8" font-size="11">vector   vector(384)</text>
  <text x="697" y="222" text-anchor="middle" fill="#6b7280" font-size="11">access_count INT</text>
  <text x="697" y="238" text-anchor="middle" fill="#6b7280" font-size="11">created_at TIMESTAMPTZ</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Port label -->
  <text x="410" y="295" text-anchor="middle" fill="#6b7280" font-size="12">Service runs on port 7747 — "loci" on a phone keypad</text>
</svg>
