<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia, serif">
  <rect width="800" height="400" fill="#0f1117"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">Energy Landscape — Memories as Basins of Attraction</text>

  <!-- Energy curve -->
  <path d="M 60 320
    C 100 320, 130 280, 160 220
    C 185 170, 195 100, 220 80
    C 245 60, 255 140, 270 180
    C 285 220, 295 260, 320 270
    C 345 280, 370 260, 390 240
    C 410 220, 420 170, 440 140
    C 460 110, 470 90, 490 85
    C 510 80, 520 110, 540 150
    C 555 180, 560 220, 575 250
    C 590 275, 610 290, 640 295
    C 665 300, 690 310, 730 320"
    fill="none" stroke="#6366f1" stroke-width="3"/>

  <!-- Basin 1 - Memory A -->
  <line x1="220" y1="80" x2="220" y2="340" stroke="#374151" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="220" cy="80" r="6" fill="#818cf8"/>
  <text x="220" y="365" text-anchor="middle" fill="#818cf8" font-size="13">Memory A</text>
  <text x="220" y="380" text-anchor="middle" fill="#6b7280" font-size="11">"JWT → session tokens"</text>

  <!-- Basin 2 - Memory B -->
  <line x1="490" y1="85" x2="490" y2="340" stroke="#374151" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="490" cy="85" r="6" fill="#818cf8"/>
  <text x="490" y="365" text-anchor="middle" fill="#818cf8" font-size="13">Memory B</text>
  <text x="490" y="380" text-anchor="middle" fill="#6b7280" font-size="11">"no localStorage tokens"</text>

  <!-- Query ball converging to Memory A -->
  <circle cx="310" cy="270" r="10" fill="#f59e0b" opacity="0.9"/>
  <text x="310" y="245" text-anchor="middle" fill="#f59e0b" font-size="12">query</text>
  <path d="M 310 268 Q 265 180 225 90" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Y axis label -->
  <text x="30" y="200" text-anchor="middle" fill="#6b7280" font-size="13" transform="rotate(-90, 30, 200)">Energy</text>

  <!-- Annotation -->
  <text x="400" y="155" text-anchor="middle" fill="#6b7280" font-size="12" font-style="italic">Query converges to nearest memory basin — no exact match needed</text>
</svg>
